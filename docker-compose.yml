version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lan_machine_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      # Zmienne zaciągane automatycznie z pliku .env
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lan_machine_backend
    restart: unless-stopped
    depends_on:
      - db
    
    # Tryb hosta jest niezbędny do działania Wake-on-LAN (pakiety broadcast)
    network_mode: "host"
    
    environment:
      # Zaciągamy URL z pliku .env (zobacz, że korzysta z 127.0.0.1, bo backend jest w trybie hosta)
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./backend:/app

  # ----------------------------------------------------------------
  # FRONTEND - Odkomentujemy ten blok, gdy stworzymy aplikację React
  # ----------------------------------------------------------------
