version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lan_machine_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lan_machine_backend
    restart: unless-stopped
    depends_on:
      - db
    # Tryb hosta jest niezbędny do działania Wake-on-LAN (pakiety broadcast)
    network_mode: "host"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    # Na produkcji lepiej zakomentować to mapowanie plików, 
    # żeby kontener używał kodu skopiowanego podczas budowania obrazu.
    # volumes:
    #   - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lan_machine_frontend
    restart: unless-stopped
    ports:
      # Wystawiamy Nginxa na domyślnym porcie HTTP (80)
      - "80:80"
    # Zauważ, że usunąłem volumes dla node_modules i /app, 
    # ponieważ Nginx po prostu serwuje "upieczone", statyczne pliki HTML/JS.

volumes:
  postgres_data: