<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Docker - {{ machine.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light pb-5">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="/ui/machines/{{ machine.mac }}" class="btn btn-outline-secondary px-4 rounded-pill">⬅️ Powrót do Huba</a>
            <h2 class="fw-bold mb-0">🐳 Zarządzanie Dockerem</h2>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="px-4 py-3">Nazwa Kontenera</th>
                                <th>Stan</th>
                                <th>Status</th>
                                <th class="text-end px-4">Akcje</th>
                            </tr>
                        </thead>
                        <tbody id="docker-tbody">
                            <tr><td colspan="4" class="text-center py-4 text-muted">Ładowanie kontenerów...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const mac = "{{ machine.mac }}";
        
        // Funkcja wysyłająca komendę do backendu
        async function doAction(containerName, action) {
            // Zmieniamy kursor i blokujemy klikanie na czas przetwarzania
            document.body.style.cursor = 'wait';
            try {
                const response = await fetch(`/api/machines/${mac}/docker/action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ container_name: containerName, action: action })
                });
                if (!response.ok) alert("Wystąpił błąd przy wysyłaniu komendy.");
            } catch (err) {
                alert("Błąd: " + err);
            }
            document.body.style.cursor = 'default';
            fetchContainers(); // Odśwież tabelę po wykonaniu akcji
        }

        // Pobieranie listy z ostatniej paczki metryk
        function fetchContainers() {
            fetch(`/machines/${mac}/metrics?limit=1`)
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0 || !data[0].dockers) return;
                    
                    const tbody = document.getElementById('docker-tbody');
                    tbody.innerHTML = data[0].dockers.map(d => {
                        const isRunning = d.state === 'running';
                        const badgeClass = isRunning ? 'bg-success' : 'bg-secondary';
                        
                        // Generowanie przycisków w zależności od stanu
                        const btnStart = isRunning ? '' : `<button onclick="doAction('${d.name}', 'start')" class="btn btn-sm btn-outline-success mx-1">▶️ Start</button>`;
                        const btnStop = !isRunning ? '' : `<button onclick="doAction('${d.name}', 'stop')" class="btn btn-sm btn-outline-danger mx-1">⏹️ Stop</button>`;
                        const btnRestart = !isRunning ? '' : `<button onclick="doAction('${d.name}', 'restart')" class="btn btn-sm btn-outline-warning mx-1">🔄 Restart</button>`;

                        return `
                            <tr>
                                <td class="px-4 fw-bold">${d.name}</td>
                                <td><span class="badge ${badgeClass}">${d.state}</span></td>
                                <td class="text-muted small">${d.status}</td>
                                <td class="text-end px-4">${btnStart}${btnStop}${btnRestart}</td>
                            </tr>
                        `;
                    }).join('');
                });
        }

        // Odświeżaj listę co 3 sekundy
        fetchContainers();
        setInterval(fetchContainers, 3000);
    </script>
</body>
</html>
