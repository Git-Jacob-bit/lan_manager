<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Telemetria - {{ machine.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="bg-light pb-5">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="/ui/machines/{{ machine.mac }}" class="btn btn-outline-secondary px-4 rounded-pill">⬅️ Powrót do Huba</a>>
            <span class="badge bg-success fs-6">Live 🟢</span>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <h2 class="mb-0">📊 {{ machine.name }}</h2>
                        <p class="text-muted mb-0">MAC: {{ machine.mac }} | IP: {{ machine.ip }}</p>
                    </div>
                    <div class="col-md-4 text-end">
                        <h5 class="mb-0">Zdrowie Dysku</h5>
                        <span id="disk-health-badge" class="badge bg-secondary fs-6">Ładowanie...</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm"><div class="card-body">
                    <div class="chart-container"><canvas id="cpuChart"></canvas></div>
                </div></div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm"><div class="card-body">
                    <div class="chart-container"><canvas id="ramChart"></canvas></div>
                </div></div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm"><div class="card-body">
                    <div class="chart-container"><canvas id="diskChart"></canvas></div>
                </div></div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm"><div class="card-body">
                    <div class="chart-container"><canvas id="netChart"></canvas></div>
                </div></div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white">
                <h4 class="mb-0">🐳 Uruchomione Kontenery Docker</h4>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Nazwa kontenera</th>
                                <th>Status</th>
                                <th>Stan (State)</th>
                            </tr>
                        </thead>
                        <tbody id="docker-tbody">
                            <tr><td colspan="3" class="text-center text-muted">Ładowanie danych...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Funkcja do rysowania pojedynczych wykresów (CPU, RAM, DYSK)
        // Funkcja do rysowania pojedynczych wykresów (CPU, RAM, DYSK)
                const initChart = (elementId, label, color, isPercentage = true) => {
                    let options = { 
                        responsive: true, maintainAspectRatio: false, animation: false,
                        scales: { 
                            x: { ticks: { maxTicksLimit: 8, maxRotation: 45, minRotation: 45 } }
                        }
                    };
                    if (isPercentage) { options.scales.y = { min: 0, max: 100 }; }
        
                    return new Chart(document.getElementById(elementId), {
                        type: 'line',
                        data: { 
                            labels: [], 
                            datasets: [{ 
                                label: label, 
                                data: [], 
                                borderColor: color, 
                                tension: 0.4,           // Zwiększyłem z 0.3 na 0.4 - linia będzie jeszcze gładsza!
                                fill: true, 
                                backgroundColor: color + '33',
                                pointRadius: 0,         // Ukrywa kropki na stałe
                                pointHoverRadius: 5     // Pokazuje kropkę tylko przy najechaniu myszką
                            }] 
                        },
                        options: options
                    });
                };
        
                // Funkcja do rysowania podwójnego wykresu (SIEĆ)
                const initNetChart = (elementId) => {
                    return new Chart(document.getElementById(elementId), {
                        type: 'line',
                        data: { labels: [], datasets: [
                            { 
                                label: 'Wysłane (MB)', 
                                data: [], 
                                borderColor: '#ff9f43', 
                                tension: 0.4, 
                                pointRadius: 0, 
                                pointHoverRadius: 5 
                            },
                            { 
                                label: 'Odebrane (MB)', 
                                data: [], 
                                borderColor: '#10ac84', 
                                tension: 0.4, 
                                pointRadius: 0, 
                                pointHoverRadius: 5 
                            }
                        ]},
                        options: { 
                            responsive: true, maintainAspectRatio: false, animation: false,
                            scales: { x: { ticks: { maxTicksLimit: 8, maxRotation: 45, minRotation: 45 } } }
                        }
                    });
                };

        // Inicjalizacja wykresów
        let cpuChart = initChart('cpuChart', 'Zużycie CPU (%)', '#ff4b4b');
        let ramChart = initChart('ramChart', 'Zużycie RAM (%)', '#0068c9');
        let diskChart = initChart('diskChart', 'Zużycie Dysku (%)', '#8e44ad');
        let netChart = initNetChart('netChart');

        // Funkcja pobierająca dane
        const fetchAndUpdate = () => {
            // Zabezpieczamy się prosząc maksymalnie o 30 ostatnich wyników
            fetch('/machines/{{ machine.mac }}/metrics?limit=30')
                .then(response => response.json())
                .then(data => {
                    if (data.length === 0) return;

                    // FastAPI zwraca dane od najnowszego, my potrzebujemy chronologicznie do wykresu
                    data.reverse(); 

                    // Aktualizacja Wykresów
                    const labels = data.map(d => new Date(d.timestamp).toLocaleTimeString());
                    
                    cpuChart.data.labels = labels;
                    cpuChart.data.datasets[0].data = data.map(d => d.cpu_usage);
                    cpuChart.update();

                    ramChart.data.labels = labels;
                    ramChart.data.datasets[0].data = data.map(d => d.ram_usage);
                    ramChart.update();

                    diskChart.data.labels = labels;
                    diskChart.data.datasets[0].data = data.map(d => d.disk_usage);
                    diskChart.update();

                    netChart.data.labels = labels;
                    netChart.data.datasets[0].data = data.map(d => d.net_sent);
                    netChart.data.datasets[1].data = data.map(d => d.net_recv);
                    netChart.update();

                    // --- Aktualizacja statusów statycznych (bierzemy najświeższy punkt danych) ---
                    const latest = data[data.length - 1];

                    // Zdrowie dysku
                    const healthBadge = document.getElementById('disk-health-badge');
                    healthBadge.innerText = latest.disk_health || "Brak danych";
                    healthBadge.className = latest.disk_health === "OK" ? "badge bg-success fs-6" : "badge bg-danger fs-6 text-white";

                    // Tabela Dockera
                    const tbody = document.getElementById('docker-tbody');
                    if (latest.dockers && latest.dockers.length > 0) {
                        tbody.innerHTML = latest.dockers.map(d => {
                            let stateClass = d.state === 'running' ? 'bg-success' : 'bg-secondary';
                            return `<tr>
                                <td><strong>${d.name}</strong></td>
                                <td class="text-muted">${d.status}</td>
                                <td><span class="badge ${stateClass}">${d.state}</span></td>
                            </tr>`;
                        }).join('');
                    } else {
                        tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">Brak uruchomionych kontenerów</td></tr>';
                    }
                })
                .catch(err => console.error("Błąd pobierania metryk:", err));
        };

        // Odpal pierwszy raz, a potem co 5 sekund
        fetchAndUpdate();
        setInterval(fetchAndUpdate, 5000);
    </script>
</body>
</html>
