<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal - {{ machine.name }}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Zapewnia, że terminal zajmie całą wysokość */
        }
        .xterm-viewport {
            border-radius: 0 0 8px 8px;
        }
        #terminal-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body class="pb-3">

    <div class="container mt-4 d-flex flex-column h-100" id="terminal-wrapper">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="/ui/machines/{{ machine.mac }}" class="btn btn-outline-secondary px-4 rounded-pill">
                ⬅️ Powrót do Huba
            </a>
            
            <div class="text-center">
                <h3 class="m-0 fw-bold text-dark">{{ machine.name }}</h3>
                <small class="text-muted font-monospace">{{ machine.ip }}</small>
            </div>

            <div>
                <button onclick="reconnect()" class="btn btn-sm btn-outline-primary rounded-pill me-2">🔄 Restart sesji</button>
                <span id="status-badge" class="badge bg-warning text-dark rounded-pill px-3 py-2 fs-6">ŁĄCZENIE...</span>
            </div>
        </div>

        <div class="card bg-dark text-white shadow-lg border-0 rounded-4 flex-grow-1 overflow-hidden d-flex flex-column mb-3">
            <div class="card-header border-secondary d-flex justify-content-between align-items-center bg-black py-2">
                <span class="text-success font-monospace mb-0" style="font-size: 1rem;">root@{{ machine.ip }}</span>
                <span class="text-secondary small">xterm.js PTY</span>
            </div>
            <div class="card-body p-2 bg-black flex-grow-1 position-relative" id="terminal-container"></div>
        </div>

    </div>

    <script>
        let term;
        let fitAddon;
        let ws;
        
        // Zmienna z Jinja2 - wstrzykujemy IP maszyny z backendu
        const MACHINE_IP = window.location.hostname;

        document.addEventListener("DOMContentLoaded", function() {
            // 1. Inicjalizacja wyglądu Terminala
            term = new Terminal({
                cursorBlink: true,
                fontFamily: 'Consolas, "Courier New", monospace',
                fontSize: 15,
                theme: {
                    background: '#000000',
                    foreground: '#00ff00',
                    cursor: '#00ff00'
                }
            });

            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(document.getElementById('terminal-container'));
            
            // Dopasowanie rozmiaru
            window.addEventListener('resize', () => {
                fitAddon.fit();
            });

            // Przesyłanie wciśniętych klawiszy do WebSocket
            term.onData(data => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(data);
                }
            });

            // 2. Automatyczny start po załadowaniu strony
            setTimeout(() => {
                fitAddon.fit();
                connectTerminal();
            }, 100);
        });

        function connectTerminal() {
            const badge = document.getElementById('status-badge');

            if (ws) {
                ws.close();
            }

            term.clear();
            term.writeln(`\r\n[Trwa nawiązywanie tunelu do ${MACHINE_IP}:8001...]`);
            
            badge.className = "badge bg-warning text-dark rounded-pill px-3 py-2 fs-6";
            badge.textContent = "ŁĄCZENIE...";

            // Nawiązanie połączenia z Agentem
            ws = new WebSocket(`ws://${MACHINE_IP}:8001/ws`);

            ws.onopen = () => {
                term.writeln('\r\n[POŁĄCZONO! Pełny dostęp do powłoki bash]\r\n');
                badge.className = "badge bg-success rounded-pill px-3 py-2 fs-6";
                badge.textContent = "ONLINE 🟢";
            };

            ws.onmessage = async (event) => {
                let text = (event.data instanceof Blob) ? await event.data.text() : event.data;
                term.write(text);
            };

            ws.onclose = () => {
                term.writeln('\r\n\r\n[Połączenie zakończone - Agent rozłączył sesję]');
                badge.className = "badge bg-secondary rounded-pill px-3 py-2 fs-6";
                badge.textContent = "ROZŁĄCZONO 🔴";
                ws = null;
            };

            ws.onerror = (error) => {
                term.writeln('\r\n[BŁĄD POŁĄCZENIA] - Upewnij się, że Agent nasłuchuje na porcie 8001.');
                badge.className = "badge bg-danger rounded-pill px-3 py-2 fs-6";
                badge.textContent = "BŁĄD ❌";
            };
        }

        function reconnect() {
            connectTerminal();
        }

        // ==========================================
        // OSZCZĘDZANIE ZASOBÓW: Automatyczne zamykanie
        // ==========================================
        // Te eventy gwarantują, że gdy klikniesz "Powrót", zamkniesz kartę 
        // przeglądarki lub odświeżysz stronę, połączenie zostanie zerwane.
        
        window.addEventListener('beforeunload', function () {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }
        });
        
        window.addEventListener('pagehide', function () {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }
        });
    </script>
</body>
</html>
